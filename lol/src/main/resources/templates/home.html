<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL.GG</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #1e1e1e;
        }

        header nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
        }

        header nav a:hover {
            color: #5a9bf6;
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
        }

        .search-container {
            margin: 40px auto;
            max-width: 600px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 15px 20px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
        }

        .search-container button {
            position: absolute;
            right: -35px;
            top: 5px;
            bottom: 5px;
            padding: 0 20px;
            background-color: #5a9bf6;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .search-container button:hover {
            background-color: #3a7dd1;
        }

        .content {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .content > div {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            height: 150px;
        }

        .content > div:hover {
            box-shadow: 0 0 10px rgba(90, 155, 246, 0.5);
        }
    </style>
</head>
<body>
<header>
    <div class="logo">LOL.GG</div>
    <nav>
        <a href="#">홈</a>
        <a href="#">랭킹</a>
        <a href="#">커뮤니티</a>
        <a href="#">장인랭킹</a>
    </nav>
</header>

<div class="search-container">
    <!-- 검색 폼 -->
    <form id="searchForm" action="/result" method="post">
        <input type="text" id="searchInput" placeholder="플레이어 이름 + #태그">
        <input type="hidden" name="gameName" id="gameName">
        <input type="hidden" name="tagLine" id="tagLine">
        <button type="submit">.GG</button>
    </form>
</div>

<div class="content">
    <div>커뮤니티</div>
    <div>로테이션</div>
</div>

<script>
    document.getElementById("searchForm").addEventListener("submit", function(event) {
        event.preventDefault(); // 기본 폼 제출 방지

        let input = document.getElementById("searchInput").value.trim();
        let gameName = "";
        let tagLine = "";

        if (input.includes("#")) {
            let parts = input.split("#");
            gameName = parts[0];
            tagLine = parts[1];
        } else {
            alert("올바른 형식으로 입력해주세요 (예: 플레이어이름#태그)");
            return;
        }


        // hidden 필드에 값 설정
        document.getElementById("gameName").value = gameName;
        document.getElementById("tagLine").value = tagLine;

        // 폼 제출
        this.submit();
    });
</script>
</body>
</html>
